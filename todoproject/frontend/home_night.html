<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro — Lofi Cabin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene" id="scene">
  <div class="stars"></div>
  <div class="moon"><div class="moon-halo"></div></div>

  
  <div class="sky-mist"></div>

  
  <svg class="mtn mtn-far" viewBox="0 0 1200 400" preserveAspectRatio="none">
    <polygon points="0,400 0,240 150,150 300,260 480,110 660,250 860,150 1040,270 1200,210 1200,400" fill="#465879"/>
  </svg>
  <svg class="mtn mtn-mid" viewBox="0 0 1200 400" preserveAspectRatio="none">
    <polygon points="0,400 0,300 220,200 400,300 600,190 820,300 1000,220 1200,300 1200,400" fill="#334262"/>
  </svg>
  <svg class="mtn mtn-near" viewBox="0 0 1200 400" preserveAspectRatio="none">
    <polygon points="0,400 0,340 260,270 520,350 760,260 1000,340 1200,290 1200,400" fill="#1e2947"/>
  </svg>

  
  <div class="lake">
    <div class="lake-shimmer"></div>
    <div class="moon-reflection"></div>
  </div>

  
  <div class="rain" id="rain"></div>
  <div class="vignette"></div>


  <div class="interior">
    <div class="beam"></div>
    <div class="string-lights">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="window-frame">
      <div class="window-glass">
        <div class="fire-glow"></div>
      </div>
      <div class="mullion-v"></div>
      <div class="mullion-h"></div>
    </div>

    <div class="hanging-plant hanging-plant--left">
      <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
        <line x1="60" y1="0" x2="60" y2="30" stroke="#3a2e22" stroke-width="3"/>
        <path d="M60 30 C 30 45, 20 70, 35 100" stroke="#2f4a3e" stroke-width="4" fill="none"/>
        <path d="M60 30 C 90 48, 95 75, 78 105" stroke="#375a4a" stroke-width="4" fill="none"/>
        <path d="M60 30 C 60 55, 58 80, 60 110" stroke="#31513f" stroke-width="4" fill="none"/>
        <ellipse cx="60" cy="25" rx="22" ry="14" fill="#26201a"/>
      </svg>
    </div>

    <div class="desk">
      <div class="laptop">
        <div class="laptop-screen"></div>
        <div class="laptop-base"></div>
      </div>
      <div class="mug"></div>
      <div class="plant-pot">
        <svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
          <path d="M30 55 C 15 45, 12 25, 22 10" stroke="#375a4a" stroke-width="3" fill="none"/>
          <path d="M30 55 C 42 42, 46 22, 36 6" stroke="#2f4a3e" stroke-width="3" fill="none"/>
          <path d="M30 55 C 30 40, 30 20, 30 5" stroke="#31513f" stroke-width="3" fill="none"/>
          <rect x="18" y="55" width="24" height="18" rx="3" fill="#4a3626"/>
        </svg>
      </div>
    </div>

    <div class="floor"></div>
  </div>

  <div class="topbar">
    <div class="logo">
      <div class="icon-btn" id="playIcon" title="Воспроизвести/пауза">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <span class="title">POMODORO</span>
      <div class="icon-btn" id="musicIcon" title="Lofi-музыка">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
    </div>
  </div>

  <div class="weather-toggle">
    <div class="icon-btn" id="weatherIcon" title="Переключить погоду">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
      </svg>
    </div>
  </div>

  <div class="timer-wrap">
    <div class="session-label" id="sessionLabel">Время фокуса</div>
    <div class="timer-card">
      <button class="ctrl-btn ghost" id="resetBtn" title="Сбросить">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
      <div class="time" id="timeDisplay" title="Нажмите, чтобы изменить время">25:00</div>
      <button class="ctrl-btn" id="playBtn" title="Старт/Пауза">
        <svg id="playIconSvg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
    <div class="mode-row">
      <button class="mode-btn active" data-min="25">Фокус 25</button>
      <button class="mode-btn" data-min="5">Отдых 5</button>
      <button class="mode-btn" data-min="15">Отдых 15</button>
    </div>
  </div>

  <div class="session-count" id="sessionCount">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span>сессии</span>
  </div>

  <button class="back-btn" id="backBtn">BACK</button>
</div>

<script src="script.js"></script>
</body>
</html>
